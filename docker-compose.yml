services:

  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    restart: unless-stopped

    ports:
      - "1883:1883"

    networks:
      - backend

    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/#", "-C", "1"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M


  bento_ml:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bento_ml
    restart: unless-stopped

    env_file:
      - .env

    environment:
      MQTT_HOST: mqtt
      POCKETBASE_URL: http://host.docker.internal:8090
      # TODO: Falta definir BENTHOS_URL aquí (ej: http://benthos_binary:4197/ingest)
      # El BatchWriter necesita esta variable para saber a dónde enviar los datos.
      # Sin ella, la variable se lee del .env pero no está documentada en .env.example
      # lo que puede confundir a quien configure el proyecto por primera vez.

    depends_on:
      mqtt:
        condition: service_healthy

    volumes:
      - ./data:/app/data:rw
      - ./tests:/app/tests:rw 
      - ./core:/app/core:rw   # [SOLVED] Fixing bug on /core, adding it to the workdir 

    ports:
      - "3000:3000"

    networks:
      - backend

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M
  
  benthos:
    image: jeffail/benthos:4.27.0
    container_name: benthos_binary
    volumes:
      - ./core/benthos.yaml:/benthos.yaml
    command: -c /benthos.yaml
    env_file:
      - .env
    ports:
      - "4197:4197"
    networks:
      - backend

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  benthos_tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bento_tests
    depends_on:
      mqtt:
        condition: service_healthy
    volumes:
      - ./tests:/app/tests:rw
    command: pytest
    networks:
      - backend
    tty: true 
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M


networks:
  backend:
    driver: bridge
