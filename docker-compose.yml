services:

  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    restart: unless-stopped

    ports:
      - "1883:1883"

    networks:
      - backend

    healthcheck:
      test: ["CMD", "mosquitto_sub", "-h", "localhost", "-t", "$$SYS/#", "-C", "1"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M


  bento_ml:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bento_ml
    restart: unless-stopped

    env_file:
      - .env

    environment:
      MQTT_HOST: mqtt
      POCKETBASE_URL: http://host.docker.internal:8090
      BENTHOS_URL: http://benthos:4197/ingest # [SOLVED] BENTHOS_URL defined in docker-compose.yml and .env.example syncronized with .env

    depends_on:
      mqtt:
        condition: service_healthy

    volumes:
      - ./data:/app/data:rw
      - ./tests:/app/tests:rw 
      - ./core:/app/core:rw # [SOLVED]: Fixed /core mounted on /app 

    ports:
      - "3000:3000"

    networks:
      - backend

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1024M
  
  benthos:
    image: jeffail/benthos:4.27.0
    container_name: benthos_binary
    volumes:
      - ./core/benthos.yaml:/benthos.yaml
    command: -c /benthos.yaml
    env_file:
      - .env
      - token.env
    ports:
      - "4197:4197"
    networks:
      - backend

    deploy:
      resources:
        limits:

          # [SOLVED]: System resources fixed for the provided use of the service
          cpus: "1"
          memory: 512M

  benthos_tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bento_tests
    depends_on:
      mqtt:
        condition: service_healthy
    volumes:
      - .:/app
    command: pytest
    networks:
      - backend
    tty: true 


networks:
  backend:
    driver: bridge
