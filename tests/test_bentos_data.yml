http:
  address: 0.0.0.0:4197

input:
  http_server:
    path: /ingest
    allowed_verbs: [ POST ]

pipeline:
  processors:
    - unarchive:
        format: json_array
    - mapping: |
        root = if !this.exists("sensor") {
          throw("Mensaje inválido: falta campo sensor")
        } else if !this.exists("value") {
          throw("Mensaje inválido: falta campo value")
        } else if !this.exists("_collection") {
          throw("Mensaje inválido: falta campo _collection")
        } else {
          this
        }

        meta agv = this.agv_id

        meta collection = this._collection
        root = this.without("_collection")
      # [SOLVED] Added if conditions to verify that the fields that are supposed to arrive in Benthos actually arrive. 
      # [AGV_ID SOLVED] Since we only insert the sensor ID when inserting data because the database is designed for that purpose, we simply extract the AGV ID but do not use it.

output:
  switch:
    retry_until_success: false
    cases:
      - check: meta("collection") == "readings"
        output:
          retry:
            max_retries: 3 # [SOLVED] Added retry policies
            backoff:
              initial_interval: 1s
              max_interval: 30s
              max_elapsed_time: 5m
            output:
              http_client:
                url: http://host.docker.internal:8090/api/collections/readings/records # [SOLVED] Authorization added with superuser in PB
                verb: POST
                headers:
                  Content-Type: application/json
                  Authorization: "Bearer ${POCKETBASE_TOKEN}"

      - check: meta("collection") == "urgent_alerts"
        output:
          retry:
            max_retries: 3 # [SOLVED] Added retry policies
            backoff:
              initial_interval: 1s
              max_interval: 30s
              max_elapsed_time: 5m
            output:
              http_client:
                url: http://host.docker.internal:8090/api/collections/urgent_alerts/records # [SOLVED] Authorization added with superuser in PB
                verb: POST
                headers:
                  Content-Type: application/json
                  Authorization: "Bearer ${POCKETBASE_TOKEN}"

      - output:
          stdout:
            codec: lines