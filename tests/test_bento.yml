# docker exec -it benthos_binary /benthos test /app/tests/test_bento.yml

http:
  address: 0.0.0.0:4197

input:
  http_server:
    path: /ingest
    allowed_verbs: [ POST ]

pipeline:
  processors:
    - mapping: |
        root.value_f = this.value * 9 / 5 + 32

test:
  - name: "Convertir temperatura C → F"
    input:
      - '{"sensor": "TEMP", "value": 25}'
    output:
      - '{"sensor": "TEMP", "value": 77}'